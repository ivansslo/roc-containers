<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>roc-containers • Modern Terminal UI</title>
<style>
  body { background:#0a0c10; color:#c9d1d9; font-family:ui-monospace,monospace; padding:20px; }
  .terminal { max-width:920px; margin:auto; background:#161b22; border:1px solid #30363d; border-radius:16px; overflow:hidden; }
  .header { background:#21262d; padding:10px 16px; display:flex; align-items:center; }
  .content { padding:22px; }
  .menu { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:6px; }
  .item { padding:9px 12px; border-radius:8px; background:#0d1117; display:flex; justify-content:space-between; align-items:center; font-size:13px; }
  .item:hover { background:#1f2937; }
  .new { color:#3fb950; font-size:10px; }
</style>
</head>
<body>
<div class="terminal">
  <div class="header">roc-containers v1.3.0 • Infrastructure Xloud</div>
  <div class="content">
    <div style="margin-bottom:16px;color:#56b6c2">⭐ AI Stack + Autonomous Orchestrator</div>
    <div class="menu">
      <div class="item"><span>roc-ai orchestrator</span><span class="new">NEW</span></div>
      <div class="item"><span>roc-agent orchestrator</span></div>
      <div class="item"><span>roc-ai mesh</span></div>
      <div class="item"><span>roc-agent import → AIS-DEV</span><span class="new">NEW</span></div>
    </div>
    <div style="margin-top:30px;font-size:12px;color:#64748b">All commands use same TOKEN auth • Gateway + AIS-DEV first-class</div>
  </div>
</div>
</body>
</html>
